name: Process Rivers Data

on:
  workflow_dispatch:
    inputs:
      load_areas_from_file:
        description: 'Load data/areas.parquet instead of building from scratch'
        required: false
        type: boolean
        default: false
  schedule:
    # Run monthly on the 1st at 00:00 UTC
    - cron: '0 0 1 * *'

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 480  # 8 hours timeout

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run batch processing
      run: |
        if [ "${{ github.event.inputs.load_areas_from_file }}" = "false" ] || [ -z "${{ github.event.inputs.load_areas_from_file }}" ]; then
          python src/batch.py --force-rebuild
        else
          python src/batch.py
        fi

    - name: Run clustering notebook
      run: |
        jupyter nbconvert --to notebook --execute notebooks/clustering.ipynb --output notebooks/clustering.ipynb
        jupyter nbconvert --to html notebooks/clustering.ipynb --output clustering.html
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git pull
        git commit -am "Update data"
